<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Database Lab — SQL &amp; PL/SQL Mastery</title>
    <script type="text/javascript">
      // SPA redirect: store the full path and redirect to root
      // so the React app can pick up the route.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        '/?/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <!-- Redirecting to the app… -->
  </body>
</html>
