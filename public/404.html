<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Database Lab</title>
    <script>
      // SPA redirect: preserve path and query string on 404
      var path = window.location.pathname;
      var query = window.location.search ? '&redirect=' + encodeURIComponent(window.location.search.slice(1)) : '';
      var hash = window.location.hash ? '&hash=' + encodeURIComponent(window.location.hash.slice(1)) : '';
      window.location.replace('/?path=' + encodeURIComponent(path) + query + hash);
    </script>
  </head>
  <body>
    Redirecting&hellip;
  </body>
</html>
